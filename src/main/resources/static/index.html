<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>校友搜索系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: #f4f6f9;
    font-family: Arial;
}

.container {
    max-width: 90%;
    margin: 40px auto;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #409eff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.card {
    display: flex;
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-right: 20px;
    object-fit: cover;
    cursor: pointer;
}

.info {
    flex: 1;
}

.name {
    font-size: 20px;
    font-weight: bold;
}

.meta {
    margin-top: 5px;
    color: #666;
}

.auth {
    margin-top: 5px;
    font-weight: bold;
    color: green;
}

.pagination button {
    margin-right: 5px;
    background: #e4e7ed;
    color: black;
}

.pagination button.active {
    background: #409eff;
    color: white;
}

.json-tooltip {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 450px;
    max-height: 500px;
    overflow: auto;
    background: black;
    color: #00ff99;
    padding: 10px;
    font-size: 12px;
    border-radius: 8px;
    white-space: pre-wrap;
    z-index: 999;
}

/* 手机端适配 */
@media (max-width: 768px) {

    .container {
        margin: 10px;
    }

    .search-box {
        flex-direction: column;
    }

    button {
        width: 100%;
    }

    .card {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .avatar {
        margin-right: 0;
        margin-bottom: 10px;
        width: 70px;
        height: 70px;
    }

    .json-tooltip {
        width: 90%;
        right: 5%;
        top: 10px;
        max-height: 60vh;
    }

    .pagination button {
    background: #e4e7ed;
    color: black;
    }
}
</style>
</head>

<body>
<div id="app" class="container">

<div class="search-box">
    <input v-model="keyword" @keyup.enter="search(1)" placeholder="输入关键词">
    <button @click="search(1)">搜索</button>
</div>

<div v-for="item in results" :key="item._raw" class="card">
    <!-- 根据姓名获取固定头像 -->
    <img class="avatar"
         :src="item.avatar || getFixedAvatarByUsername(item.name || '未知姓名')"
         @mouseenter="showJson(item._raw)"
         @mouseleave="hideJson">

    <div class="info">
        <div class="name">
            {{ item.name || '未知姓名' }}
        </div>
        <div class="meta">
            学院专业：{{ getCollege(item) }}-{{ getMajor(item) }}
        </div>
        <div class="meta">
            班级学号：{{ getClassNo(item) }}-{{ getStudentNo(item) }}
        </div>
        <div class="meta">
            入学：{{ getJoinYear(item) }} -
            毕业：{{ getGraduateYear(item) }}
        </div>
        <div class="meta">
            工作：{{ getCompany(item) }}-{{ getDept(item) }} {{ getDuty(item) }}
        </div>
        <div class="auth" v-if="item.authentication === 1">
            ✔ 已认证
        </div>
    </div>
</div>

<div class="pagination">
    <button
        v-for="i in totalPage"
        :key="i"
        :class="{active: i===page}"
        @click="search(i)">
        {{ i }}
    </button>
</div>

<div v-if="hoverJson" class="json-tooltip">
{{ hoverJson }}
</div>

</div>

<script>
const { createApp } = Vue

createApp({
data() {
    return {
        keyword: '',
        results: [],
        page: 1,
        size: 20,
        total: 0,
        totalPage: 0,
        hoverJson: null,
        // 鸣潮椿相关图片链接库（补全https）
        avatarList: [
            // 作品图
            "https://img2.huashi6.com/images/resource/thumbnail/2025/09/11/124249_76901362422.jpg",
            "https://img2.huashi6.com/images/resource/thumbnail/2025/06/28/183757_7705120182.jpg",
            "https://img2.huashi6.com/images/resource/thumbnail/2025/05/12/20115_86588720256.jpg",
            "https://img2.huashi6.com/images/resource/thumbnail/2025/04/02/151143_90386143625.jpg",
            "https://img2.huashi6.com/images/resource/thumbnail/2025/01/26/19447_84718548994.jpg",
            "https://img2.huashi6.com/images/resource/thumbnail/2024/12/17/195313_393009570.jpg",
            // 头像图
            "https://img2.huashi6.com/images/face/a701357842318/2024/01/17/13358_43885976156.jpg",
            "https://img2.huashi6.com/images/face/a622643811136/2024/09/27/13216_33635271866.jpg",
            "https://img2.huashi6.com/images/face/a184902237855/2025/03/17/15720_24024462571.jpg",
            "https://img2.huashi6.com/images/face/a222612178252/2023/02/27/94319_19927667007.jpg"
        ]
    }
},
methods: {
    search(page) {
        this.page = page
        fetch("/api/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                keyword: this.keyword,
                page: this.page,
                size: this.size
            })
        })
        .then(res => res.json())
        .then(res => {
            this.results = res.data.map(raw => {
                let obj = JSON.parse(raw)
                obj._raw = raw   // 保存原始字符串
                return obj
            })
            this.total = res.total
            this.totalPage = Math.ceil(this.total / this.size)
        })
    },
    getCollege(item) {
        return item.learnEntityList?.[0]?.college || ''
    },
    getMajor(item) {
        return item.learnEntityList?.[0]?.major || ''
    },
    getClassNo(item) {
        return item.learnEntityList?.[0]?.classNo || ''
    },
    getStudentNo(item) {
        return item.learnEntityList?.[0]?.studentNo || ''
    },
    getJoinYear(item) {
        return item.learnEntityList?.[0]?.joinYear || ''
    },
    getGraduateYear(item) {
        return item.learnEntityList?.[0]?.graduateYear || ''
    },
    getCompany(item) {
        return item.workDTOList?.[0]?.companyName || ''
    },
    getDept(item) {
        return item.workDTOList?.[0]?.dept || ''
    },
    getDuty(item) {
        return item.workDTOList?.[0]?.duty || ''
    },
    showJson(raw) {
        try {
            this.hoverJson = JSON.stringify(JSON.parse(raw), null, 2)
        } catch {
            this.hoverJson = raw
        }
    },
    hideJson() {
        this.hoverJson = null
    },
    // 核心：根据姓名生成哈希值，返回固定头像
    getFixedAvatarByUsername(name) {
        // 1. 简单哈希算法：将姓名转换为数字哈希值（兼容中文）
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            // 获取字符的Unicode编码，累加计算哈希
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
            // 确保哈希值为正数
            hash = hash & hash;
        }
        // 2. 将哈希值映射到头像数组的索引（固定范围）
        const index = Math.abs(hash) % this.avatarList.length;
        // 3. 返回固定索引对应的头像链接
        return this.avatarList[index];
    }
}
}).mount("#app")
</script>

</body>
</html>
